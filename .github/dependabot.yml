version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-tooling:
        patterns: ["turbo", "@biomejs/*", "@changesets/*", "typescript", "tsup", "vitest", "*vitest*"]
      mcp-sdk:
        patterns: ["@modelcontextprotocol/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
