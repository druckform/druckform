name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Changesets → npm + GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create release commits + tags
      pull-requests: write  # open/update Version PRs
      packages: write       # push to GHCR
      id-token: write       # OIDC trusted publishing to npm (tokenless) + provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for Changesets to determine what changed
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # NOT 9.14.x — pnpm 9.14.0/9.14.1 broke `pnpm publish` arg forwarding to
          # npm, so `changeset publish` fails with EINVALIDTAGNAME (packed file
          # paths mis-read as dist-tags). See pnpm#8788. 9.13.2 is the known-good
          # version; keep this in sync with the `packageManager` field.
          version: 9.13.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22            # resolves to latest 22.x (>= 22.14, required for OIDC)
          cache: pnpm

      # OIDC trusted publishing requires npm >= 11.5.1; the runner ships 10.9.x.
      # pnpm publish delegates to the system npm CLI, so upgrading npm here makes
      # `pnpm changeset publish` authenticate via OIDC (no token needed).
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Changesets — open/update Version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `version` runs `changeset version && pnpm format`: bumping rewrites
          # package.json with JSON.stringify (which re-expands "files": ["dist"]),
          # so we re-run biome format to keep the Version PR lint-clean.
          version: pnpm run version
          # Packages are already built above; publish only
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN on purpose: with id-token:write + npm >= 11.5.1, changesets
          # (via pnpm → npm) authenticates through OIDC trusted publishing. Each
          # package must have a trusted publisher configured on npmjs.com (repo
          # druckform/druckform, workflow release.yml). Publishes public via
          # publishConfig.access=public + .changeset access:public; provenance is
          # generated automatically under OIDC.

      # Only push Docker image when packages were actually published
      - name: Log in to GHCR
        if: steps.changesets.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from druckform package
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./packages/druckform/package.json').version")
          MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.changesets.outputs.published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.changesets.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/druckform:latest
            ghcr.io/${{ github.repository_owner }}/druckform:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/druckform:${{ steps.version.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
