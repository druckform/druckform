name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Changesets → npm + GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create release commits + tags
      pull-requests: write  # open/update Version PRs
      packages: write       # push to GHCR
      # NOTE: intentionally NO `id-token: write`. Granting it lets changesets/action
      # pick npm OIDC trusted publishing when NPM_TOKEN is absent — which, for these
      # unconfigured packages, fails the publish with a bogus "EINVALIDTAGNAME
      # index.js.map" (a mangled provenance subject list). Without id-token, OIDC is
      # unavailable, npm provenance is never attempted, and publishing always uses
      # classic NPM_TOKEN auth. Docker provenance/sbom attestations do not need it.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for Changesets to determine what changed
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # NOT 9.14.x — pnpm 9.14.0/9.14.1 broke `pnpm publish` arg forwarding to
          # npm, so `changeset publish` fails with EINVALIDTAGNAME (packed file
          # paths mis-read as dist-tags). See pnpm#8788. 9.13.2 is the known-good
          # version; keep this in sync with the `packageManager` field.
          version: 9.13.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Changesets — open/update Version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Packages are already built above; publish only
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action reads NPM_TOKEN to write ~/.npmrc and authenticate
          # via classic token auth. The env var MUST be named NPM_TOKEN: if it is
          # absent while id-token:write is granted, the action silently falls back
          # to npm OIDC trusted publishing — which is NOT configured for these
          # packages and fails the first publish with a bogus EINVALIDTAGNAME.
          # Scoped packages publish publicly via publishConfig.access=public +
          # .changeset access:public.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Only push Docker image when packages were actually published
      - name: Log in to GHCR
        if: steps.changesets.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from druckform package
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./packages/druckform/package.json').version")
          MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.changesets.outputs.published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.changesets.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/druckform:latest
            ghcr.io/${{ github.repository_owner }}/druckform:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/druckform:${{ steps.version.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
